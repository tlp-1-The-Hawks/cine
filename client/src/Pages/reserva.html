<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Reservas de Películas</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }

        header {
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 20px;
        }

        .movie-reservation {
            list-style: none;
            padding: 0;
        }

        .movie-reservation li {
            background-color: #fff;
            margin-bottom: 20px;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .movie-reservation li h2 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .movie-reservation li p {
            margin: 0;
        }

        .reservation-details {
            margin-top: 20px;
            padding: 10px;
            background-color: #f7f7f7;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Mis Reservas de Películas</h1>
    </header>
    <div class="container">
        <ul class="movie-reservation">
            <li>
                <h2>Película 1</h2>
                <p><strong>Precio:</strong> $10.00</p>
                <p><strong>Cine:</strong> Cine A</p>
                <p><strong>Lugar:</strong> Sala 1</p>
                <p><strong>Duración:</strong> 2 horas</p>
                <p><strong>Número de Entradas:</strong> 2</p>
                <p><strong>Título de Reserva:</strong> Mi Reserva 1</p>
                <div class="reservation-details">
                    <p><strong>Fecha:</strong> 2023-11-15</p>
                    <p><strong>Hora:</strong> 19:30</p>
                    <p><strong>Número de Confirmación:</strong> ABC123</p>
                </div>
            </li>
        </ul>
    </div>
</body>
</html>
